[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "alembic upgrade head && python -m scripts.seed_countries && (python -m scripts.seed_demo_patient || echo 'demo-patient seed skipped (non-fatal)') && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
